[input]
xkb_layout = us,ru
xkb_options = grp:alt_shift_toggle

[core]
plugins = animate autostart blur command expo grid move place resize switcher wm-actions
close_top_view = <alt> KEY_F4

[autostart]
background = swaybg -i ~/wallpapers/wallpaper.jpg

[command]
binding_terminal = <super> <shift> KEY_ENTER
command_terminal = wezterm

binding_screenshot = KEY_SYSRQ
command_screenshot = grim ~/screenshots/$(date '+%s').png

binding_exit = <super> KEY_ESC
command_exit = pkill wayfire

binding_google = <super> KEY_G
command_google = ungoogled-chromium --force-dark-mode

binding_bemenu = <super> KEY_P
command_bemenu = bemenu-run --fn "Fantasque Sans Mono 19" -p ">>>" -H 35 \
--hb "\#000000" --hf "\#FF007F" \
--fb "\#000000" --ff "\#FF007F" \
--cb "\#000000" --cf "\#000000" \
--nb "\#000000" --nf "\#7F7F7F" \
--tb "\#000000" --tf "\#FF007F" \
--ab "\#000000" --af "\#7F7F7F"

[expo]
toggle = <super>
select_workspace_1 = KEY_1
select_workspace_2 = KEY_2
select_workspace_3 = KEY_3
select_workspace_4 = KEY_4
select_workspace_5 = KEY_5
select_workspace_6 = KEY_6
select_workspace_7 = KEY_7
select_workspace_8 = KEY_8
select_workspace_9 = KEY_9

[move]
activate = <super> BTN_LEFT

[resize]
activate = <super> BTN_RIGHT

[switcher]
next_view = <alt> KEY_TAB
prev_view = <alt> <shift> KEY_TAB

[wm-actions]
toggle_fullscreen = <super> KEY_F

